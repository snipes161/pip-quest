<!DOCTYPE html>
<html lang="en" data-theme="green">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#050a06" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>PIP·QUEST</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23071409'/%3E%3Ccircle cx='32' cy='32' r='19' fill='none' stroke='%233dff80' stroke-width='3'/%3E%3Cpath d='M32 16 L40 32 L32 48 L24 32 Z' fill='%233dff80'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050a06; --panel:#0a160d; --panel2:#0d2012;
  --line:#173d23; --line2:#0f2b18;
  --fg:#3dff80; --dim:#23a857;
  --faint:#0f3b22;
  --ok:#3dff80; --okglow:#1bff6a;
  --danger:#ff5252; --dangerglow:#ff2e2e;
  --gold:#ffd23d; --cyan:#46d6ff;
  --accent-main:var(--gold);
  --accent-side:var(--fg);
  --accent-misc:var(--dim);
  --glow: 0 0 6px rgba(61,255,128,.45);
  --radius:14px;
  --maxw:680px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="amber"]{
  --bg:#0a0600; --panel:#170f02; --panel2:#1f1503; --line:#3d2a08; --line2:#2b1d05;
  --fg:#ffb000; --dim:#b87a00; --faint:#3a2700;
  --ok:#5ee06a; --okglow:#3ff04a; --danger:#ff5a3c; --dangerglow:#ff3a1e;
  --gold:#ffe14d; --cyan:#ffcf6a;
  --accent-main:var(--gold); --accent-side:var(--fg); --accent-misc:var(--dim);
  --glow: 0 0 6px rgba(255,176,0,.45);
  --theme-color:#0a0600;
}
[data-theme="blue"]{
  --bg:#03070d; --panel:#08121f; --panel2:#0b1a2c; --line:#163654; --line2:#0f263c;
  --fg:#5cc8ff; --dim:#2f86c2; --faint:#0e2a44;
  --ok:#54e6a8; --okglow:#2ff09a; --danger:#ff6b6b; --dangerglow:#ff3a3a;
  --gold:#ffd23d; --cyan:#5cc8ff; --accent-main:var(--gold); --accent-side:var(--fg); --accent-misc:var(--dim);
  --glow: 0 0 6px rgba(92,200,255,.45);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--fg);
  font-family:"Share Tech Mono", ui-monospace, "Roboto Mono", Menlo, Consolas, monospace;
  font-size:16px; line-height:1.4; overflow:hidden;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  letter-spacing:.3px;
}
button{font-family:inherit; color:inherit; cursor:pointer;}
input,textarea{font-family:inherit;}
::selection{background:var(--fg); color:var(--bg);}

/* ---- CRT overlays ---- */
.scanlines{
  position:fixed; inset:0; pointer-events:none; z-index:60;
  background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.16) 3px, rgba(0,0,0,0) 4px);
  mix-blend-mode:multiply; opacity:.6;
}
body::after{ /* vignette + subtle green wash */
  content:""; position:fixed; inset:0; pointer-events:none; z-index:59;
  background:radial-gradient(120% 90% at 50% 35%, rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%);
}
@media (prefers-reduced-motion: no-preference){
  .flicker{animation:flick 6s infinite steps(60);}
  @keyframes flick{0%,97%{opacity:1}97.5%{opacity:.93}98%{opacity:1}99%{opacity:.96}100%{opacity:1}}
}

/* ---- Boot ---- */
#boot{
  position:fixed; inset:0; z-index:200; background:var(--bg); color:var(--fg);
  display:flex; flex-direction:column; justify-content:center; align-items:center; gap:14px;
  padding-top:var(--safe-top);
}
#boot .sweep{position:absolute; left:0; right:0; top:0; height:3px; background:var(--fg); box-shadow:0 0 18px 4px var(--fg); opacity:.8; animation:sweep .7s ease-out forwards;}
@keyframes sweep{from{top:0}to{top:100%; opacity:0}}
#boot .logo{font-family:"VT323",monospace; font-size:64px; line-height:1; text-shadow:0 0 14px var(--fg); opacity:0; animation:bootin .5s .15s forwards;}
#boot .ln{font-size:13px; color:var(--dim); opacity:0; animation:bootin .4s .35s forwards; text-align:center;}
@keyframes bootin{to{opacity:1}}
#boot.hide{opacity:0; transition:opacity .25s; pointer-events:none;}

/* ---- App shell ---- */
#app{height:100dvh; display:flex; flex-direction:column; max-width:var(--maxw); margin:0 auto; position:relative;}
.statbar{
  padding:calc(var(--safe-top) + 8px) 14px 8px; border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:12px; background:linear-gradient(180deg,var(--panel),rgba(0,0,0,0)); position:relative; z-index:5;
}
.brand{display:flex; align-items:center; gap:8px; min-width:0;}
.brand .mark{font-size:20px; text-shadow:var(--glow); transform:translateY(-1px);}
.brand .name{font-size:15px; letter-spacing:1px; white-space:nowrap;}
.brand .name b{color:var(--fg);}
.lvlwrap{flex:1; min-width:0;}
.lvltop{display:flex; justify-content:space-between; align-items:baseline; font-size:11px; color:var(--dim); letter-spacing:1px;}
.lvltop .lv{font-family:"VT323",monospace; font-size:20px; color:var(--fg); text-shadow:var(--glow); letter-spacing:0;}
.xpbar{height:6px; border:1px solid var(--line); border-radius:6px; overflow:hidden; margin-top:3px; background:var(--panel2);}
.xpfill{height:100%; background:var(--fg); box-shadow:0 0 8px var(--fg); width:0; transition:width .5s ease;}
.iconbtns{display:flex; gap:6px;}
.iconbtn{
  width:38px; height:38px; border:1px solid var(--line); background:var(--panel); border-radius:10px;
  font-size:16px; display:grid; place-items:center; color:var(--dim); transition:.12s; padding:0;
}
.iconbtn:active{transform:scale(.92); border-color:var(--fg); color:var(--fg);}

.tabs{display:flex; gap:8px; padding:10px 14px 6px; position:relative; z-index:4;}
.tab{
  flex:1; padding:8px 4px; border:1px solid var(--line); background:var(--panel); border-radius:10px;
  font-size:12px; letter-spacing:1.5px; color:var(--dim); transition:.12s; text-align:center;
}
.tab .n{font-size:11px; opacity:.7; margin-left:5px;}
.tab.active{color:var(--bg); background:var(--fg); border-color:var(--fg); box-shadow:var(--glow); font-weight:bold;}
.tab:active{transform:scale(.97);}

#view{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; padding:0 14px calc(20px + var(--safe-bottom)); position:relative; z-index:1;}
.view-enter{animation:viewin .22s ease;}
@keyframes viewin{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}

/* ---- Quick add ---- */
.quick{
  display:flex; gap:8px; position:sticky; top:0; z-index:3; padding:8px 0 12px;
  background:linear-gradient(180deg,var(--bg) 70%, rgba(0,0,0,0));
}
.quick input{
  flex:1; min-width:0; background:var(--panel); border:1px solid var(--line); color:var(--fg);
  border-radius:12px; padding:14px 14px; font-size:16px; outline:none; transition:.12s;
}
.quick input::placeholder{color:var(--dim); opacity:.7;}
.quick input:focus{border-color:var(--fg); box-shadow:var(--glow);}
.quick .add{
  width:54px; border:1px solid var(--fg); background:var(--fg); color:var(--bg); border-radius:12px;
  font-size:26px; font-weight:bold; box-shadow:var(--glow); transition:.1s; padding:0; line-height:1;
}
.quick .add:active{transform:scale(.9);}

/* ---- Mission cards ---- */
.list{display:flex; flex-direction:column; gap:10px;}
.card{
  position:relative; border:1px solid var(--line); background:var(--panel); border-radius:var(--radius);
  padding:13px 14px 12px 16px; overflow:hidden; transition:.14s; animation:cardin .26s ease both;
}
@keyframes cardin{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
.card:active{transform:scale(.985); border-color:var(--fg);}
.card .accent{position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent-side);}
.card.main .accent{background:var(--accent-main); box-shadow:0 0 10px var(--accent-main);}
.card.misc .accent{background:var(--accent-misc);}
.card.done{opacity:.55;}
.card.failed{opacity:.5;}
.card .ttl{font-size:16px; color:var(--fg); display:flex; align-items:flex-start; gap:8px; word-break:break-word;}
.card .ttl .q{flex-shrink:0; color:var(--accent-side);}
.card.main .ttl .q{color:var(--accent-main);}
.card.misc .ttl .q{color:var(--accent-misc);}
.card.done .ttl, .card.failed .ttl{text-decoration:line-through;}
.card .meta{display:flex; align-items:center; gap:10px; margin-top:9px; font-size:11px; color:var(--dim); letter-spacing:.5px; flex-wrap:wrap;}
.card .pill{border:1px solid var(--line); border-radius:20px; padding:2px 8px; letter-spacing:1px;}
.card .prog{flex:1; min-width:60px; height:4px; border:1px solid var(--line2); border-radius:4px; overflow:hidden; background:var(--panel2);}
.card .prog i{display:block; height:100%; background:var(--dim); box-shadow:0 0 6px var(--dim); width:0;}
.card.main .prog i{background:var(--accent-main); box-shadow:0 0 6px var(--accent-main);}

.empty{ text-align:center; color:var(--dim); padding:60px 20px; }
.empty .big{font-family:"VT323",monospace; font-size:30px; color:var(--fg); text-shadow:var(--glow); margin-bottom:8px;}
.empty .sm{font-size:13px; opacity:.8; line-height:1.6;}

/* ---- Detail ---- */
.detail{padding-top:2px;}
.dtop{position:sticky; top:0; z-index:3; padding:8px 0 10px; background:linear-gradient(180deg,var(--bg) 78%, rgba(0,0,0,0));}
.backrow{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.backbtn{border:1px solid var(--line); background:var(--panel); border-radius:10px; padding:8px 14px 8px 10px; font-size:13px; color:var(--dim); letter-spacing:1px; transition:.12s;}
.backbtn:active{transform:scale(.95); color:var(--fg); border-color:var(--fg);}
.trashbtn{width:40px; height:38px; border:1px solid var(--line); background:var(--panel); border-radius:10px; color:var(--danger); font-size:16px; transition:.12s; padding:0;}
.trashbtn:active{transform:scale(.9); border-color:var(--danger);}

.actions{display:flex; gap:10px;}
.bigbtn{flex:1; border-radius:12px; padding:16px 8px; font-size:15px; letter-spacing:2px; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:8px; transition:.1s; border:2px solid;}
.bigbtn .ic{font-size:22px; line-height:1;}
.bigbtn:active{transform:scale(.96);}
.btn-ok{border-color:var(--ok); color:var(--ok); background:rgba(61,255,128,.08); box-shadow:0 0 14px rgba(61,255,128,.25) inset, 0 0 8px rgba(61,255,128,.2);}
.btn-fail{border-color:var(--danger); color:var(--danger); background:rgba(255,82,82,.08); box-shadow:0 0 14px rgba(255,82,82,.22) inset, 0 0 8px rgba(255,82,82,.18);}

.banner{border:1px dashed var(--line); border-radius:12px; padding:14px; text-align:center; letter-spacing:2px; font-size:14px;}
.banner.ok{color:var(--ok); border-color:var(--ok);}
.banner.fail{color:var(--danger); border-color:var(--danger);}
.reopen{margin-top:10px; width:100%; border:1px solid var(--fg); background:transparent; color:var(--fg); border-radius:12px; padding:14px; letter-spacing:2px; font-size:14px; transition:.12s;}
.reopen:active{transform:scale(.97); background:rgba(61,255,128,.08);}

.titleedit{width:100%; background:transparent; border:none; border-bottom:1px solid var(--line); color:var(--fg); font-size:24px; font-family:"VT323",monospace; letter-spacing:1px; padding:14px 2px 8px; outline:none; margin-top:14px;}
.titleedit:focus{border-color:var(--fg);}

.seg{display:flex; gap:8px; margin:14px 0 4px;}
.seg button{flex:1; border:1px solid var(--line); background:var(--panel); border-radius:10px; padding:9px 4px; font-size:12px; letter-spacing:1px; color:var(--dim); transition:.12s; display:flex; flex-direction:column; align-items:center; gap:2px;}
.seg button .g{font-size:14px;}
.seg button.on{color:var(--bg); font-weight:bold;}
.seg button.on[data-t="main"]{background:var(--accent-main); border-color:var(--accent-main); box-shadow:0 0 8px var(--accent-main);}
.seg button.on[data-t="side"]{background:var(--fg); border-color:var(--fg); box-shadow:var(--glow);}
.seg button.on[data-t="misc"]{background:var(--dim); border-color:var(--dim);}

.section{margin-top:22px;}
.sechead{display:flex; align-items:center; justify-content:space-between; font-size:12px; letter-spacing:2px; color:var(--dim); border-bottom:1px solid var(--line2); padding-bottom:6px; margin-bottom:10px;}
.sechead .ct{color:var(--fg); font-size:12px;}

/* objectives */
.obj{display:flex; align-items:center; gap:11px; padding:10px 2px;}
.obj+.obj{border-top:1px solid var(--line2);}
.box{width:24px; height:24px; flex-shrink:0; border:2px solid var(--dim); border-radius:6px; display:grid; place-items:center; font-size:15px; color:var(--bg); transition:.12s; background:transparent;}
.box.done{background:var(--fg); border-color:var(--fg); box-shadow:var(--glow);}
.obj .txt{flex:1; word-break:break-word; font-size:15px;}
.obj.done .txt{color:var(--dim); text-decoration:line-through;}
.obj .x{width:30px; height:30px; flex-shrink:0; border:none; background:transparent; color:var(--dim); font-size:16px; opacity:.55; transition:.12s; padding:0;}
.obj .x:active{color:var(--danger); opacity:1;}
.objadd{display:flex; gap:8px; margin-top:8px;}
.objadd input{flex:1; min-width:0; background:var(--panel); border:1px solid var(--line2); color:var(--fg); border-radius:10px; padding:11px 12px; font-size:15px; outline:none;}
.objadd input:focus{border-color:var(--fg);}
.objadd button{width:46px; border:1px solid var(--line); background:var(--panel); color:var(--fg); border-radius:10px; font-size:22px; padding:0; transition:.1s;}
.objadd button:active{transform:scale(.9);}

/* notes */
.notes{width:100%; min-height:96px; background:var(--panel); border:1px solid var(--line); color:var(--fg); border-radius:12px; padding:13px; font-size:15px; line-height:1.5; outline:none; resize:vertical;}
.notes:focus{border-color:var(--fg); box-shadow:var(--glow);}
.notes::placeholder{color:var(--dim); opacity:.6;}

/* media */
.addbtn{width:100%; border:1px dashed var(--line); background:var(--panel); color:var(--dim); border-radius:12px; padding:13px; font-size:13px; letter-spacing:1.5px; transition:.12s; display:flex; align-items:center; justify-content:center; gap:8px;}
.addbtn:active{transform:scale(.98); color:var(--fg); border-color:var(--fg);}
.addbtn .ic{font-size:17px;}
.grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px;}
.thumb{position:relative; aspect-ratio:1; border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--panel2);}
.thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.thumb .del{position:absolute; top:4px; right:4px; width:24px; height:24px; border:none; border-radius:6px; background:rgba(0,0,0,.65); color:var(--danger); font-size:13px; display:grid; place-items:center; padding:0;}

/* voice logs */
.vlog{border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; background:var(--panel);}
.vlog .vhead{display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--dim); letter-spacing:1px; margin-bottom:8px;}
.vlog .vhead .del{border:none; background:transparent; color:var(--dim); font-size:15px; padding:2px 4px;}
.vlog .vhead .del:active{color:var(--danger);}
.vlog audio{width:100%; height:36px; margin-bottom:8px; filter:hue-rotate(60deg);}
.vlog .tx{width:100%; background:var(--panel2); border:1px solid var(--line2); color:var(--fg); border-radius:8px; padding:10px; font-size:14px; line-height:1.5; outline:none; resize:vertical; min-height:48px;}
.vlog .tx:focus{border-color:var(--fg);}
.vlog .tx::placeholder{color:var(--dim); opacity:.6;}

.recbtn{width:100%; border:1px solid var(--fg); background:transparent; color:var(--fg); border-radius:12px; padding:14px; font-size:14px; letter-spacing:2px; transition:.12s; display:flex; align-items:center; justify-content:center; gap:10px;}
.recbtn:active{transform:scale(.98);}
.recbtn .dot{width:11px; height:11px; border-radius:50%; background:var(--fg); box-shadow:var(--glow);}
.recbtn.recording{border-color:var(--danger); color:var(--danger); background:rgba(255,82,82,.07);}
.recbtn.recording .dot{background:var(--danger); animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1; transform:scale(1)}50%{opacity:.4; transform:scale(.75)}}
.recpanel{border:1px solid var(--danger); border-radius:12px; padding:12px; margin-bottom:10px; background:rgba(255,82,82,.05);}
.recpanel .live{font-size:14px; color:var(--fg); min-height:22px; line-height:1.5;}
.recpanel .live .interim{color:var(--dim);}
.recpanel .timer{font-family:"VT323",monospace; font-size:22px; color:var(--danger); letter-spacing:1px;}
.hint{font-size:11px; color:var(--dim); opacity:.75; margin-top:6px; line-height:1.5;}

/* snackbar */
.snackbar{
  position:fixed; left:50%; transform:translate(-50%,80px); bottom:calc(18px + var(--safe-bottom));
  background:var(--panel2); border:1px solid var(--fg); border-radius:12px; padding:12px 12px 12px 16px;
  display:flex; align-items:center; gap:14px; z-index:120; max-width:calc(100vw - 28px); width:max-content;
  box-shadow:0 6px 30px rgba(0,0,0,.6), var(--glow); opacity:0; transition:transform .25s, opacity .25s; pointer-events:none;
}
.snackbar.show{transform:translate(-50%,0); opacity:1; pointer-events:auto;}
.snackbar .msg{font-size:14px; color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.snackbar button{border:1px solid var(--fg); background:transparent; color:var(--fg); border-radius:8px; padding:7px 12px; font-size:12px; letter-spacing:1px; flex-shrink:0;}

/* sheet (settings / viewer) */
.sheet{position:fixed; inset:0; z-index:130; background:rgba(0,0,0,.7); display:none; align-items:flex-end; justify-content:center; backdrop-filter:blur(2px);}
.sheet.show{display:flex; animation:fadein .2s;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheetcard{width:100%; max-width:var(--maxw); background:var(--panel); border:1px solid var(--line); border-bottom:none; border-radius:18px 18px 0 0; padding:18px 16px calc(24px + var(--safe-bottom)); animation:slideup .25s ease;}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheetcard h2{font-family:"VT323",monospace; font-size:24px; letter-spacing:1px; margin:0 0 14px; color:var(--fg); text-shadow:var(--glow); display:flex; justify-content:space-between; align-items:center;}
.sheetcard h2 .close{border:1px solid var(--line); background:var(--panel2); border-radius:8px; font-size:16px; width:34px; height:34px; color:var(--dim); padding:0;}
.srow{display:flex; align-items:center; justify-content:space-between; padding:13px 2px; border-top:1px solid var(--line2); font-size:14px;}
.srow:first-of-type{border-top:none;}
.srow .lab{color:var(--fg); letter-spacing:.5px;}
.srow .sub{font-size:11px; color:var(--dim);}
.themebtns{display:flex; gap:8px;}
.themebtns button{width:34px; height:34px; border-radius:50%; border:2px solid var(--line); padding:0;}
.themebtns button.on{border-color:#fff; box-shadow:0 0 8px rgba(255,255,255,.5);}
.tg{width:54px; height:30px; border:1px solid var(--line); border-radius:30px; background:var(--panel2); position:relative; transition:.15s; padding:0;}
.tg i{position:absolute; top:2px; left:2px; width:24px; height:24px; border-radius:50%; background:var(--dim); transition:.15s;}
.tg.on{border-color:var(--fg); background:rgba(61,255,128,.15);}
.tg.on i{left:26px; background:var(--fg); box-shadow:var(--glow);}
.sbtn{flex:1; border:1px solid var(--line); background:var(--panel2); color:var(--fg); border-radius:10px; padding:12px; font-size:13px; letter-spacing:1px; transition:.12s;}
.sbtn:active{transform:scale(.97); border-color:var(--fg);}
.aboutln{font-size:11px; color:var(--dim); line-height:1.6; margin-top:14px; text-align:center;}

/* image viewer */
.viewer{position:fixed; inset:0; z-index:140; background:rgba(0,0,0,.93); display:none; align-items:center; justify-content:center;}
.viewer.show{display:flex; animation:fadein .15s;}
.viewer img{max-width:96vw; max-height:88vh; object-fit:contain; border:1px solid var(--line);}

#errbox{display:none; padding:30px 20px; text-align:center; color:var(--danger); font-size:14px; line-height:1.6;}
</style>

<body>
<div class="scanlines"></div>

<div id="boot">
  <div class="sweep"></div>
  <div class="logo">◈</div>
  <div class="ln">PIP-OS v3.1 · QUEST MODULE<br>INITIALIZING…</div>
</div>

<div id="app" class="flicker" style="display:none">
  <header class="statbar">
    <div class="brand">
      <span class="mark">◈</span>
      <span class="name">PIP·<b>QUEST</b></span>
    </div>
    <div class="lvlwrap">
      <div class="lvltop"><span class="lv" id="lvlNum">LV 1</span><span id="xpTxt">0/100 XP</span></div>
      <div class="xpbar"><div class="xpfill" id="xpFill"></div></div>
    </div>
    <div class="iconbtns">
      <button class="iconbtn" id="soundBtn" title="Sound">♪</button>

  <nav class="tabs">
    <button class="tab active" data-tab="active">ACTIVE<span class="n" id="cActive">0</span></button>

</div>

<div id="errbox"></div>

<div class="snackbar" id="snack"><span class="msg" id="snackMsg"></span><button id="snackBtn">UNDO</button></div>

<!-- Settings sheet -->
<div class="sheet" id="settings">
  <div class="sheetcard">
    <h2>SETTINGS <button class="close" id="setClose">✕</button></h2>
    <div class="srow">
      <div><div class="lab">DISPLAY</div><div class="sub">CRT color theme</div></div>
      <div class="themebtns" id="themeBtns">
        <button data-th="green" style="background:#3dff80"></button>
        <button data-th="amber" style="background:#ffb000"></button>
        <button data-th="blue" style="background:#5cc8ff"></button>
      </div>
    </div>
    <div class="srow">
      <div><div class="lab">SOUND FX</div><div class="sub">Terminal beeps</div></div>
      <button class="tg" id="soundTg"><i></i></button>
    </div>
    <div class="srow">
      <div><div class="lab">HAPTICS</div><div class="sub">Vibrate on actions</div></div>
      <button class="tg" id="hapticTg"><i></i></button>
    </div>
    <div class="srow" style="gap:10px;">
      <button class="sbtn" id="exportBtn">⭳ BACKUP DATA</button>
      <button class="sbtn" id="importBtn">⭱ RESTORE</button>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" hidden />
    <div class="aboutln">PIP·QUEST · all data stored on this device only<br>track your life like it's a quest log</div>
  </div>
</div>

<!-- Image viewer -->
<div class="viewer" id="viewer">
  <button class="vclose" id="viewerClose">✕</button>
  <img id="viewerImg" alt="" />
</div>

<!-- hidden inputs -->
<input type="file" id="imgInput" accept="image/*" capture="environment" hidden />

<script>
"use strict";
(function(){

/* ============ IndexedDB ============ */
const DB_NAME="pipquest-db", STORE="missions";
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE,{keyPath:"id"}); };
    r.onsuccess=e=>{_db=e.target.result; res(_db);};
    r.onerror=e=>rej(e.target.error);
  });
}
function tx(mode){ return _db.transaction(STORE,mode).objectStore(STORE); }
function idbAll(){ return new Promise((res,rej)=>{ const r=tx("readonly").getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); }); }
function idbPut(o){ return new Promise((res,rej)=>{ const r=tx("readwrite").put(o); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
function idbDel(id){ return new Promise((res,rej)=>{ const r=tx("readwrite").delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }

/* ============ State / settings ============ */
const XPV={main:50, side:25, misc:10};
const TYPES={main:{g:"★",label:"MAIN QUEST"}, side:{g:"◆",label:"SIDE QUEST"}, misc:{g:"●",label:"MISC"}};
const state={ tab:"active", missions:[], view:"list", currentId:null, urls:[], rec:null, lastDeleted:null, settingsOpen:false, viewerOpen:false, pushed:false };

const settings={ theme:"green", sound:true, haptic:true };
function loadSettings(){ try{ const s=JSON.parse(localStorage.getItem("pq-settings")||"{}"); Object.assign(settings,s);}catch(e){} }
function saveSettings(){ try{ localStorage.setItem("pq-settings", JSON.stringify(settings)); }catch(e){} }

/* ============ Utils ============ */
const $=id=>document.getElementById(id);
const now=()=>Date.now();
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
function esc(s){ return (s||"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function ago(t){
  const d=now()-t, m=60000, h=3600000, day=86400000;
  if(d<m) return "just now";
  if(d<h) return Math.floor(d/m)+"m ago";
  if(d<day) return Math.floor(d/h)+"h ago";
  if(d<day*7) return Math.floor(d/day)+"d ago";
  return new Date(t).toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
function blobToDataURL(b){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(b); }); }
function dataURLtoBlob(u){ return fetch(u).then(r=>r.blob()); }
function vibe(ms){ if(settings.haptic && navigator.vibrate){ try{navigator.vibrate(ms);}catch(e){} } }

/* ============ Audio FX ============ */
let actx=null;
function ac(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); return actx; }
function beep(freq,dur,type,vol){
  if(!settings.sound) return; const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||"square"; o.frequency.value=freq;
  g.gain.setValueAtTime(0,c.currentTime);
  g.gain.linearRampToValueAtTime(vol||.05,c.currentTime+.01);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+(dur||.08));
  o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+(dur||.08)+.02);
}
const sfx={
  tap:()=>beep(880,.04,"square",.03),
  add:()=>{beep(660,.05,"square",.04); setTimeout(()=>beep(990,.06,"square",.04),50);},
  check:()=>beep(1320,.07,"square",.045),
  complete:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.12,"triangle",.05),i*70));},
  fail:()=>{[330,247,165].forEach((f,i)=>setTimeout(()=>beep(f,.16,"sawtooth",.045),i*90));},
  levelup:()=>{[784,988,1175,1568].forEach((f,i)=>setTimeout(()=>beep(f,.16,"square",.05),i*90));},
  open:()=>beep(440,.05,"sine",.03),
};

/* ============ XP / level ============ */
function totalXP(){ return state.missions.reduce((s,m)=> s + (m.status==="complete"?(XPV[m.type]||10):0), 0); }
function levelInfo(){ const xp=totalXP(); const lv=Math.floor(xp/100)+1; return {xp, lv, into:xp%100, need:100, pct:(xp%100)/100}; }
function updateStats(){
  const li=levelInfo();
  $("lvlNum").textContent="LV "+li.lv;
  $("xpTxt").textContent=li.into+"/"+li.need+" XP";
  $("xpFill").style.width=(li.pct*100)+"%";
  $("cActive").textContent=state.missions.filter(m=>m.status==="active").length;
  $("cDone").textContent=state.missions.filter(m=>m.status==="complete").length;
  $("cFail").textContent=state.missions.filter(m=>m.status==="failed").length;
}

/* ============ Data ops ============ */
function getM(id){ return state.missions.find(m=>m.id===id); }
async function saveM(m,bump){ if(bump!==false){ m.updatedAt=now(); m.lastWorkedAt=now(); } await idbPut(m); }
async function createMission(title){
  const m={ id:uid(), title:title.trim(), type:"side", status:"active",
    notes:"", objectives:[], images:[], voiceNotes:[],
    createdAt:now(), updatedAt:now(), lastWorkedAt:now(), completedAt:null };
  state.missions.unshift(m); await idbPut(m); return m;
}

/* ============ Rendering: list ============ */
function sortedFor(tab){
  let arr=state.missions.filter(m=>m.status===tab);
  if(tab==="active") arr.sort((a,b)=>(b.lastWorkedAt||b.createdAt)-(a.lastWorkedAt||a.createdAt));
  else arr.sort((a,b)=>(b.completedAt||b.updatedAt)-(a.completedAt||a.updatedAt));
  return arr;
}
function cardHTML(m){
  const done=m.objectives.filter(o=>o.done).length, tot=m.objectives.length;
  const pct= tot? Math.round(done/tot*100):0;
  const cls=m.type==="main"?"main":(m.type==="misc"?"misc":"");
  const stcls=m.status==="complete"?"done":(m.status==="failed"?"failed":"");
  const extras=[];
  if(m.images.length) extras.push("▣ "+m.images.length);
  if(m.voiceNotes.length) extras.push("♪ "+m.voiceNotes.length);
  if(m.notes && m.notes.trim()) extras.push("≣ log");
  return `<div class="card ${cls} ${stcls}" data-id="${m.id}">
    <div class="accent"></div>
    <div class="ttl"><span class="q">${TYPES[m.type].g}</span><span>${esc(m.title)||"(untitled)"}</span></div>
    <div class="meta">
      <span class="pill">${TYPES[m.type].label}</span>
      ${tot?`<span>${done}/${tot}</span><span class="prog"><i style="width:${pct}%"></i></span>`:`<span class="prog"><i></i></span>`}
      ${extras.length?`<span>${extras.join("  ")}</span>`:""}
      <span>${m.status==="active"?ago(m.lastWorkedAt||m.createdAt):ago(m.completedAt||m.updatedAt)}</span>
    </div>
  </div>`;
}
function renderList(){
  state.view="list"; state.currentId=null; revokeUrls();
  const arr=sortedFor(state.tab);
  let body;
  if(state.tab==="active"){
    body=`<div class="quick">
        <input id="quickInput" placeholder="New mission…" autocomplete="off" enterkeyhint="done" maxlength="120"/>
        <button class="add" id="quickAdd">+</button>
      </div>`;
  } else body="";
  if(arr.length){
    body+=`<div class="list">${arr.map(cardHTML).join("")}</div>`;
  } else {
    const msg = state.tab==="active"
      ? {b:"NO ACTIVE MISSIONS", s:"Type above and hit + to log your first quest.<br>Daily tasks, side projects, big goals — all of it."}
      : state.tab==="complete"
      ? {b:"NOTHING COMPLETED YET", s:"Finished quests land here and earn XP."}
      : {b:"NO FAILED MISSIONS", s:"Quests you mark failed show up here.<br>Failure is just XP you haven't earned."};
    body+=`<div class="empty"><div class="big">${msg.b}</div><div class="sm">${msg.s}</div></div>`;
  }
  const v=$("view"); v.innerHTML=body; v.classList.remove("view-enter"); void v.offsetWidth; v.classList.add("view-enter"); v.scrollTop=0;
  // bind
  v.querySelectorAll(".card").forEach(c=>c.addEventListener("click",()=>{ sfx.open(); openDetail(c.dataset.id); }));
  const qi=$("quickInput"), qa=$("quickAdd");
  if(qi){
    const submit=async()=>{ const t=qi.value.trim(); if(!t) return; const m=await createMission(t); sfx.add(); vibe(12); qi.value=""; renderList(); qi.focus(); flashCard(m.id); };
    qa.addEventListener("click",submit);
    qi.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); submit(); }});
  }
}
function flashCard(id){ const el=document.querySelector(`.card[data-id="${id}"]`); if(el){ el.style.borderColor="var(--fg)"; el.style.boxShadow="var(--glow)"; setTimeout(()=>{el.style.borderColor=""; el.style.boxShadow="";},600);} }

/* ============ Rendering: detail ============ */
function revokeUrls(){ state.urls.forEach(u=>{ try{URL.revokeObjectURL(u);}catch(e){} }); state.urls=[]; }
function objURL(blob){ const u=URL.createObjectURL(blob); state.urls.push(u); return u; }

function openDetail(id){
  const m=getM(id); if(!m) return;
  state.view="detail"; state.currentId=id;
  m.lastWorkedAt=now(); idbPut(m); // opening counts as working on it
  if(!state.pushed){ history.pushState({d:1},""); state.pushed=true; }
  renderDetail();
}
function renderDetail(){
  const m=getM(state.currentId); if(!m){ returnToList(); return; }
  revokeUrls();
  const active=m.status==="active";
  let top=`<div class="dtop">
    <div class="backrow">
      <button class="backbtn" id="backBtn">‹ MISSIONS</button>
      <button class="trashbtn" id="delBtn" title="Delete">🗑</button>
    </div>`;
  if(active){
    top+=`<div class="actions">
      <button class="bigbtn btn-ok" id="completeBtn"><span class="ic">✓</span> COMPLETE</button>
      <button class="bigbtn btn-fail" id="failBtn"><span class="ic">✕</span> FAIL</button>
    </div>`;
  } else {
    const ok=m.status==="complete";
    top+=`<div class="banner ${ok?"ok":"fail"}">${ok?"✓ MISSION COMPLETE":"✕ MISSION FAILED"}${ok?` · +${XPV[m.type]} XP`:""}</div>
      <button class="reopen" id="reopenBtn">↻ REACTIVATE MISSION</button>`;
  }
  top+=`</div>`;

  const seg=`<div class="seg">
    ${Object.keys(TYPES).map(t=>`<button data-t="${t}" class="${m.type===t?"on":""}"><span class="g">${TYPES[t].g}</span>${TYPES[t].label.split(" ")[0]}</button>`).join("")}
  </div>`;

  const body=`<div class="detail">
    ${top}
    <input class="titleedit" id="titleEdit" value="${esc(m.title)}" placeholder="Mission name…" maxlength="120"/>
    ${seg}

    <div class="section">
      <div class="sechead">OBJECTIVES <span class="ct" id="objCt"></span></div>
      <div id="objList"></div>
      <div class="objadd">
        <input id="objInput" placeholder="Add objective…" autocomplete="off" enterkeyhint="done" maxlength="160"/>
        <button id="objAdd">+</button>
      </div>
    </div>

    <div class="section">
      <div class="sechead">LOG ENTRY</div>
      <textarea class="notes" id="notes" placeholder="Notes, details, context…">${esc(m.notes)}</textarea>
    </div>

    <div class="section">
      <div class="sechead">PHOTOS <span class="ct" id="imgCt"></span></div>
      <div id="imgGrid"></div>
      <button class="addbtn" id="addImg"><span class="ic">▣</span> ADD PHOTO</button>
    </div>

    <div class="section">
      <div class="sechead">VOICE LOGS <span class="ct" id="vCt"></span></div>
      <div id="recHolder"></div>
      <div id="vList"></div>
      <button class="recbtn" id="recBtn"><span class="dot"></span> RECORD VOICE LOG</button>
      <div class="hint" id="recHint"></div>
    </div>
  </div>`;
  const v=$("view"); v.innerHTML=body; v.classList.remove("view-enter"); void v.offsetWidth; v.classList.add("view-enter"); v.scrollTop=0;

  // top actions
  $("backBtn").addEventListener("click",()=>{ sfx.tap(); returnToList(); });
  $("delBtn").addEventListener("click",()=>deleteMission(m));
  if(active){
    $("completeBtn").addEventListener("click",()=>finishMission(m,"complete"));
    $("failBtn").addEventListener("click",()=>finishMission(m,"failed"));
  } else {
    $("reopenBtn").addEventListener("click",async()=>{ m.status="active"; m.completedAt=null; await saveM(m); sfx.open(); vibe(12); renderDetail(); updateStats(); });
  }
  // title
  const te=$("titleEdit");
  const saveTitle=()=>{ const nv=te.value.trim(); if(nv!==m.title){ m.title=nv; saveM(m); } };
  te.addEventListener("blur",saveTitle);
  te.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); te.blur(); }});
  // type seg
  v.querySelectorAll(".seg button").forEach(b=>b.addEventListener("click",async()=>{
    m.type=b.dataset.t; await saveM(m); sfx.tap(); vibe(8);
    v.querySelectorAll(".seg button").forEach(x=>x.classList.toggle("on",x.dataset.t===m.type));
  }));
  // notes
  const nt=$("notes"); let nTimer=null;
  nt.addEventListener("input",()=>{ m.notes=nt.value; clearTimeout(nTimer); nTimer=setTimeout(()=>saveM(m),350); });
  // objectives
  renderObjectives(m);
  const oi=$("objInput");
  const addObj=async()=>{ const t=oi.value.trim(); if(!t) return; m.objectives.push({id:uid(),text:t,done:false}); await saveM(m); sfx.add(); vibe(8); oi.value=""; renderObjectives(m); oi.focus(); };
  $("objAdd").addEventListener("click",addObj);
  oi.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); addObj(); }});
  // images
  renderImages(m);
  $("addImg").addEventListener("click",()=>{ const inp=$("imgInput"); inp.onchange=()=>handleImg(m,inp); inp.value=""; inp.click(); });
  // voice
  renderVoice(m);
  setupRecording(m);
}
function renderObjectives(m){
  const el=$("objList"); if(!el) return;
  const done=m.objectives.filter(o=>o.done).length;
  $("objCt").textContent=m.objectives.length?`${done}/${m.objectives.length}`:"";
  el.innerHTML=m.objectives.map(o=>`<div class="obj ${o.done?"done":""}" data-id="${o.id}">
      <button class="box ${o.done?"done":""}" data-act="toggle">${o.done?"✓":""}</button>
      <span class="txt">${esc(o.text)}</span>
      <button class="x" data-act="del">✕</button>
    </div>`).join("");
  el.querySelectorAll(".obj").forEach(row=>{
    const id=row.dataset.id, o=m.objectives.find(x=>x.id===id);
    row.querySelector('[data-act="toggle"]').addEventListener("click",async()=>{
      o.done=!o.done; await saveM(m); if(o.done){sfx.check(); vibe(14);} else sfx.tap(); renderObjectives(m);
    });
    row.querySelector('[data-act="del"]').addEventListener("click",async()=>{
      m.objectives=m.objectives.filter(x=>x.id!==id); await saveM(m); sfx.tap(); renderObjectives(m);
    });
  });
}
function renderImages(m){
  const el=$("imgGrid"); if(!el) return;
  $("imgCt").textContent=m.images.length?String(m.images.length):"";
  el.innerHTML=m.images.length?`<div class="grid">${m.images.map(im=>`<div class="thumb" data-id="${im.id}"><img src="${objURL(im.blob)}" alt="photo"/><button class="del" data-act="del">✕</button></div>`).join("")}</div>`:"";
  el.querySelectorAll(".thumb").forEach(t=>{
    const id=t.dataset.id, im=m.images.find(x=>x.id===id);
    t.querySelector("img").addEventListener("click",()=>openViewer(im.blob));
    t.querySelector('[data-act="del"]').addEventListener("click",async e=>{ e.stopPropagation(); m.images=m.images.filter(x=>x.id!==id); await saveM(m); sfx.tap(); renderImages(m); });
  });
}
async function handleImg(m,inp){
  const f=inp.files&&inp.files[0]; if(!f) return;
  m.images.push({id:uid(),blob:f,createdAt:now()});
  await saveM(m); sfx.add(); vibe(10); renderImages(m);
}
function renderVoice(m){
  const el=$("vList"); if(!el) return;
  $("vCt").textContent=m.voiceNotes.length?String(m.voiceNotes.length):"";
  el.innerHTML=m.voiceNotes.map(vn=>`<div class="vlog" data-id="${vn.id}">
      <div class="vhead"><span>VOICE LOG · ${ago(vn.createdAt)}</span><button class="del" data-act="del">🗑</button></div>
      ${vn.blob?`<audio controls preload="metadata" src="${objURL(vn.blob)}"></audio>`:""}
      <textarea class="tx" data-act="tx" placeholder="Transcript (tap to edit)…">${esc(vn.transcript||"")}</textarea>
    </div>`).join("");
  el.querySelectorAll(".vlog").forEach(row=>{
    const id=row.dataset.id, vn=m.voiceNotes.find(x=>x.id===id);
    const txa=row.querySelector('[data-act="tx"]'); let t=null;
    txa.addEventListener("input",()=>{ vn.transcript=txa.value; clearTimeout(t); t=setTimeout(()=>saveM(m),350); });
    row.querySelector('[data-act="del"]').addEventListener("click",async()=>{ m.voiceNotes=m.voiceNotes.filter(x=>x.id!==id); await saveM(m); sfx.tap(); renderVoice(m); });
  });
}

/* ============ Voice recording + transcription ============ */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const hasMR=typeof MediaRecorder!=="undefined";
function pickMime(){ if(!hasMR) return ""; const c=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg"]; for(const t of c){ if(MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(t)) return t; } return ""; }
function setupRecording(m){
  const btn=$("recBtn"), hint=$("recHint");
  const secure = window.isSecureContext;
  let msgs=[];
  if(!secure) msgs.push("Voice recording needs a secure (https) context — works in the installed app, or when this page is hosted over https.");
  else { if(!hasMR) msgs.push("Audio recording isn't supported in this browser."); if(!SR) msgs.push("Live transcription isn't supported here — audio still records and you can type the transcript."); }
  hint.innerHTML=msgs.join("<br>");
  if(!secure || !hasMR){ btn.disabled=true; btn.style.opacity=".5"; return; }
  btn.addEventListener("click",()=>{ if(state.rec) stopRec(); else startRec(m); });
}
async function startRec(m){
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ $("recHint").innerHTML="Microphone permission denied. Enable mic access to record voice logs."; return; }
  const mime=pickMime(); const mr=new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
  const chunks=[]; let transcript=""; let rec=null; const t0=now();
  mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
  // panel
  const holder=$("recHolder");
  holder.innerHTML=`<div class="recpanel"><div class="vhead" style="color:var(--danger)"><span>● RECORDING</span><span class="timer" id="recTimer">0:00</span></div><div class="live" id="recLive"><span class="interim">listening…</span></div></div>`;
  const live=$("recLive");
  const timerEl=$("recTimer");
  const ti=setInterval(()=>{ const s=Math.floor((now()-t0)/1000); timerEl.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); },300);
  // speech
  if(SR){
    rec=new SR(); rec.continuous=true; rec.interimResults=true; rec.lang=navigator.language||"en-US";
    rec.onresult=e=>{ let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){ const r=e.results[i]; if(r.isFinal) transcript+=r[0].transcript+" "; else interim+=r[0].transcript; }
      live.innerHTML=esc(transcript)+`<span class="interim">${esc(interim)}</span>`;
    };
    rec.onerror=()=>{};
    try{ rec.start(); }catch(e){}
  }
  mr.onstop=async()=>{
    clearInterval(ti); stream.getTracks().forEach(t=>t.stop());
    if(rec){ try{rec.stop();}catch(e){} }
    const blob=chunks.length?new Blob(chunks,{type:mime||"audio/webm"}):null;
    const mm=getM(state.currentId); if(mm){ mm.voiceNotes.push({id:uid(),blob,transcript:transcript.trim(),createdAt:now()}); await saveM(mm); }
    state.rec=null; holder.innerHTML=""; updateRecBtn(false); sfx.add(); vibe(14);
    if(getM(state.currentId)) renderVoice(getM(state.currentId));
  };
  mr.start();
  state.rec={mr,stream,rec};
  updateRecBtn(true); vibe(20); sfx.tap();
}
function stopRec(){ if(state.rec){ try{state.rec.mr.stop();}catch(e){} } }
function updateRecBtn(on){ const b=$("recBtn"); if(!b) return; b.classList.toggle("recording",on); b.innerHTML=on?`<span class="dot"></span> STOP RECORDING`:`<span class="dot"></span> RECORD VOICE LOG`; }

/* ============ Complete / fail / delete ============ */
async function finishMission(m,status){
  const before=levelInfo().lv;
  m.status=status; m.completedAt=now(); await saveM(m);
  if(status==="complete"){ sfx.complete(); vibe([15,40,15]); } else { sfx.fail(); vibe([30,30,30]); }
  updateStats();
  const after=levelInfo().lv;
  returnToList();
  if(status==="complete" && after>before){ setTimeout(()=>{ sfx.levelup(); showSnack("⬆ LEVEL UP — NOW LV "+after,null,null,3000); },400); }
  else showSnack(status==="complete"?"✓ Mission complete":"✕ Mission failed","UNDO",async()=>{ m.status="active"; m.completedAt=null; await saveM(m); renderList(); updateStats(); });
}
async function deleteMission(m){
  state.lastDeleted=m;
  state.missions=state.missions.filter(x=>x.id!==m.id);
  await idbDel(m.id);
  sfx.tap(); vibe(15);
  returnToList(); updateStats();
  showSnack("Mission deleted","UNDO",async()=>{ if(state.lastDeleted){ state.missions.push(state.lastDeleted); await idbPut(state.lastDeleted); state.lastDeleted=null; renderList(); updateStats(); }});
}

/* ============ Navigation / history ============ */
function returnToList(){
  if(state.pushed){ state.pushed=false; history.back(); /* popstate will render list */ }
  else { renderList(); }
}
window.addEventListener("popstate",()=>{
  if(state.viewerOpen){ closeViewer(true); return; }
  if(state.settingsOpen){ closeSettings(true); return; }
  if(state.view==="detail"){ state.pushed=false; renderList(); }
});

/* ============ Snackbar ============ */
let snackTimer=null;
function showSnack(msg,actionLabel,fn,ms){
  const sb=$("snack"), b=$("snackBtn");
  $("snackMsg").textContent=msg;
  if(actionLabel){ b.style.display=""; b.textContent=actionLabel; b.onclick=()=>{ hideSnack(); if(fn) fn(); }; }
  else b.style.display="none";
  sb.classList.add("show");
  clearTimeout(snackTimer); snackTimer=setTimeout(hideSnack, ms||4000);
}
function hideSnack(){ $("snack").classList.remove("show"); }

/* ============ Settings sheet ============ */
function applyTheme(){ document.documentElement.setAttribute("data-theme",settings.theme);
  const tc={green:"#050a06",amber:"#0a0600",blue:"#03070d"}[settings.theme]||"#050a06";
  let mt=document.querySelector('meta[name="theme-color"]'); if(mt) mt.setAttribute("content",tc);
}
function syncSettingsUI(){
  document.querySelectorAll("#themeBtns button").forEach(b=>b.classList.toggle("on",b.dataset.th===settings.theme));
  $("soundTg").classList.toggle("on",settings.sound);
  $("hapticTg").classList.toggle("on",settings.haptic);
  $("soundBtn").style.color=settings.sound?"var(--fg)":"var(--dim)";
  $("soundBtn").textContent=settings.sound?"♪":"♪̸";
}
function openSettings(){ state.settingsOpen=true; if(!state.pushed){ history.pushState({s:1},""); } $("settings").classList.add("show"); syncSettingsUI(); }
function closeSettings(fromPop){ state.settingsOpen=false; $("settings").classList.remove("show"); if(!fromPop && history.state && history.state.s) history.back(); }

/* ============ Image viewer ============ */
let viewerUrl=null;
function openViewer(blob){ state.viewerOpen=true; viewerUrl=URL.createObjectURL(blob); $("viewerImg").src=viewerUrl; $("viewer").classList.add("show"); history.pushState({v:1},""); sfx.open(); }
function closeViewer(fromPop){ state.viewerOpen=false; $("viewer").classList.remove("show"); if(viewerUrl){ URL.revokeObjectURL(viewerUrl); viewerUrl=null; } if(!fromPop && history.state && history.state.v) history.back(); }

/* ============ Backup / restore ============ */
async function exportData(){
  const data=[];
  for(const m of state.missions){
    const c=JSON.parse(JSON.stringify({...m,images:[],voiceNotes:[]}));
    c.images=[]; for(const im of m.images){ c.images.push({id:im.id,createdAt:im.createdAt,data:await blobToDataURL(im.blob)}); }
    c.voiceNotes=[]; for(const vn of m.voiceNotes){ c.voiceNotes.push({id:vn.id,createdAt:vn.createdAt,transcript:vn.transcript,data:vn.blob?await blobToDataURL(vn.blob):null}); }
    data.push(c);
  }
  const blob=new Blob([JSON.stringify({app:"pipquest",version:1,exported:now(),missions:data},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="pipquest-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  showSnack("Backup downloaded",null,null,2500);
}
async function importData(file){
  try{
    const txt=await file.text(); const obj=JSON.parse(txt);
    const arr=obj.missions||obj; if(!Array.isArray(arr)) throw 0;
    for(const c of arr){
      const m={ id:c.id||uid(), title:c.title||"", type:c.type||"side", status:c.status||"active",
        notes:c.notes||"", objectives:c.objectives||[], images:[], voiceNotes:[],
        createdAt:c.createdAt||now(), updatedAt:c.updatedAt||now(), lastWorkedAt:c.lastWorkedAt||c.createdAt||now(), completedAt:c.completedAt||null };
      for(const im of (c.images||[])){ if(im.data) m.images.push({id:im.id||uid(),createdAt:im.createdAt||now(),blob:await dataURLtoBlob(im.data)}); }
      for(const vn of (c.voiceNotes||[])){ m.voiceNotes.push({id:vn.id||uid(),createdAt:vn.createdAt||now(),transcript:vn.transcript||"",blob:vn.data?await dataURLtoBlob(vn.data):null}); }
      const idx=state.missions.findIndex(x=>x.id===m.id); if(idx>=0) state.missions[idx]=m; else state.missions.push(m);
      await idbPut(m);
    }
    closeSettings(); renderList(); updateStats(); showSnack("Data restored",null,null,2500);
  }catch(e){ showSnack("Couldn't read that backup file",null,null,3000); }
}

/* ============ Wire global controls ============ */
function wireControls(){
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active"); state.tab=t.dataset.tab; sfx.tap(); renderList();
  }));
  $("setBtn").addEventListener("click",()=>{ sfx.open(); openSettings(); });
  $("setClose").addEventListener("click",()=>closeSettings());
  $("settings").addEventListener("click",e=>{ if(e.target.id==="settings") closeSettings(); });
  $("soundBtn").addEventListener("click",()=>{ settings.sound=!settings.sound; saveSettings(); syncSettingsUI(); if(settings.sound){ ac(); sfx.tap(); } vibe(8); });
  document.querySelectorAll("#themeBtns button").forEach(b=>b.addEventListener("click",()=>{ settings.theme=b.dataset.th; saveSettings(); applyTheme(); syncSettingsUI(); sfx.tap(); vibe(8); }));
  $("soundTg").addEventListener("click",()=>{ settings.sound=!settings.sound; saveSettings(); syncSettingsUI(); if(settings.sound){ac(); sfx.tap();} });
  $("hapticTg").addEventListener("click",()=>{ settings.haptic=!settings.haptic; saveSettings(); syncSettingsUI(); vibe(15); });
  $("exportBtn").addEventListener("click",exportData);
  $("importBtn").addEventListener("click",()=>$("importFile").click());
  $("importFile").addEventListener("change",e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; });
  $("viewerClose").addEventListener("click",()=>closeViewer());
  $("viewer").addEventListener("click",e=>{ if(e.target.id==="viewer") closeViewer(); });
  // resume audio on first touch
  document.addEventListener("touchstart",()=>ac(),{once:true,passive:true});
  document.addEventListener("click",()=>ac(),{once:true});
}

/* ============ Boot ============ */
async function init(){
  loadSettings(); applyTheme();
  try{ await openDB(); state.missions=await idbAll(); }
  catch(e){
    $("boot").classList.add("hide");
    $("errbox").style.display="block";
    $("errbox").innerHTML="⚠ STORAGE UNAVAILABLE<br><br>This device/browser is blocking local storage (IndexedDB). Open PIP·QUEST in a normal browser tab or the installed app — not in private/incognito mode.";
    return;
  }
  wireControls(); syncSettingsUI(); updateStats(); renderList();
  $("app").style.display="flex";
  setTimeout(()=>{ const b=$("boot"); b.classList.add("hide"); setTimeout(()=>b.remove(),300); }, 650);
}
$("boot").addEventListener("click",()=>{ const b=$("boot"); b.classList.add("hide"); setTimeout(()=>{ if(b.parentNode) b.remove(); },300); });

if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();

// register service worker (offline) — best effort
if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }

})();
</script>
