name: Build PIP-QUEST APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show environment and files
        run: |
          node --version
          npm --version
          echo "---- repo root ----"
          ls -la
          echo "---- www folder ----"
          ls -la www || echo "NO www FOLDER FOUND"

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "android/ already exists, skipping add"
          fi

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pip-quest-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
