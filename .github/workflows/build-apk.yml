name: Build PIP-QUEST APK

# Builds an installable Android APK in the cloud.
# Runs automatically on every push, and can also be triggered by hand
# from the Actions tab (the "Run workflow" button).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest   # GitHub's Ubuntu runners ship with the Android SDK preinstalled

    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      # Create the native Android project from the Capacitor scaffold.
      # "|| true" so a re-run doesn't fail if the android/ folder already exists.
      - name: Add Android platform
        run: npx cap add android || true

      # Turn assets/icon-*.png into real Android launcher icons (incl. adaptive
      # icons) and a dark splash, written into the native android/ project.
      - name: Generate app icon and splash screen
        run: npx capacitor-assets generate --android

      - name: Sync web assets into the Android project
        run: npx cap sync android

      # Speech recognition needs the microphone permission and (on Android 11+)
      # a queries entry so the app can see the system speech service.
      - name: Add microphone permission for voice input
        run: |
          python3 -c "import pathlib; p=pathlib.Path('android/app/src/main/AndroidManifest.xml'); s=p.read_text(); inj='    <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n    <queries>\n        <intent>\n            <action android:name=\"android.speech.RecognitionService\" />\n        </intent>\n    </queries>\n'; s = s if 'RECORD_AUDIO' in s else s.replace('</manifest>', inj + '</manifest>'); p.write_text(s); print('AndroidManifest.xml patched for voice input')"

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pip-quest-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
